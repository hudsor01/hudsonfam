# Woodpecker CI pipeline for hudsonfam
# Builds Docker image and pushes to Forgejo registry (git.homelab)
# Flux Image Automation watches git.homelab/forgejo-admin/hudsonfam and auto-deploys
# plugins/docker:20 allowlisted via WOODPECKER_PLUGINS_PRIVILEGED
---
when:
  - event: push
    branch: main
  - event: manual

steps:
  # Generate timestamp tag in YYYYMMDDHHmmss format for Flux numerical policy
  - name: generate-tag
    image: alpine:3.21
    commands:
      - date -u +%Y%m%d%H%M%S > .tags
      - echo "Tag:" && cat .tags

  # Build and push Docker image to Forgejo registry
  - name: build-and-push
    image: plugins/docker:20
    depends_on:
      - generate-tag
    # Resource limits to avoid OOM during COPY node_modules (4Gi required)
    # Native K8s secret refs for registry credentials (WOODPECKER_BACKEND_K8S_ALLOW_NATIVE_SECRETS=true)
    backend_options:
      kubernetes:
        resources:
          requests:
            memory: 2Gi
            cpu: "1"
          limits:
            memory: 4Gi
            cpu: "2"
        secrets:
          - name: forgejo-registry
            key: PLUGIN_USERNAME
            target: PLUGIN_USERNAME
          - name: forgejo-registry
            key: PLUGIN_PASSWORD
            target: PLUGIN_PASSWORD
    settings:
      # IMPORTANT: Must match Flux ImageRepository (git.homelab, not git.thehudsonfam.com)
      registry: git.homelab
      # Full path with registry prefix to avoid docker.io default behavior
      repo: git.homelab/forgejo-admin/hudsonfam
      tags_file: .tags
      dockerfile: Dockerfile
      context: .
      # Flannel VXLAN MTU
      mtu: 1420
      # git.homelab uses Traefik default cert — skip TLS verification
      insecure: true
